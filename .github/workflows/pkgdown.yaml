name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.2.2"
          use-public-rspm: true

      - name: Configure Bioconductor repos (R 4.2 / Bioc 3.16)
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = "3.16", ask = FALSE, update = FALSE)

          repos <- BiocManager::repositories()

          cat("Writing repos to ~/.Rprofile\n")
          cat(
            "options(repos = ",
            deparse(repos),
            ")\n",
            file = path.expand("~/.Rprofile"),
            append = TRUE
          )

          print(repos)
        shell: Rscript {0}
      - name: Install pryr from CRAN archive (removed from CRAN 2026-01-30)
        run: |
          install.packages("remotes")
          remotes::install_url(
            "https://cran.r-project.org/src/contrib/Archive/pryr/pryr_0.1.6.tar.gz",
            upgrade = "never"
          )
        shell: Rscript {0}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            url::https://cran.r-project.org/src/contrib/Archive/pryr/pryr_0.1.6.tar.gz
          needs: website

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment